<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Tvorba bussiness modelů - Pacner</title>

    <style>
        body {
            background-color: #f5f5f5;

        }

        h1 {
            text-align: center;
            font-size: 2em;
            color: #333;
            margin: 0;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;

        }

        td {
            padding: 0;

            border: 1px solid #333;

        }

        button:hover {
